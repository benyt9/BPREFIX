mappings:
  prefix: "<dark_gray>[<gradient:aqua:blue>BPREFIX<dark_gray>] <gray>"
  colors:
    message:
      success: "<gradient:#a8ff78:#78ffd6>"
      error: "<red>"
      info: "<gradient:#55cdfc:#f7a8b8:#ffffff>"

messages:
  usage: "<colors.message:info>Usage: /prefix"
  no-permission: "<colors.message:error>You do not have permission to do this!"
  prefix-created: "<colors.message:success>The prefix <white>%name% <colors.message:success>has been created."
  prefix-reset: "<colors.message:info>Your prefix has been reset."
  prefix-selected: "<colors.message:success>Your prefix has been changed to <white>%name% <colors.message:success>."
  no-item-in-hand: "<colors.message:info>You must hold an item in your hand!"
  only-players: "<colors.message:error>This command can only be used by players!"
  prefix-reload-success: "<colors.message:success>Configurations have been reloaded successfully!"

  # GUI Mappings
  menu:
    title: "<colors.message:info>Prefix Selection"
    reset-button: "<red>✘ Remove Prefix"
    item-lore: "<dark_gray>» <gray>Click to select this design"
    previous-page: "<green>◄ Previous Page"
    next-page: "<green>Next Page ►"